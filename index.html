<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register a Lead</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Oswald', 'Arial Narrow', Arial, sans-serif;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }
  .launcher {
    text-align: center;
    max-width: 360px;
  }
  .launcher h2 {
    color: #c8102e;
    font-size: 20px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .launcher p {
    font-size: 12px;
    font-weight: 400;
    color: #666;
    margin-bottom: 16px;
    text-transform: none;
    line-height: 1.4;
  }
  .launcher a {
    display: inline-block;
    font-family: 'Oswald', Arial, sans-serif;
    background-color: #c8102e;
    color: #fff;
    font-weight: 600;
    text-transform: uppercase;
    font-size: 14px;
    letter-spacing: 2px;
    text-decoration: none;
    border: none;
    border-radius: 0;
    padding: 14px 32px;
    cursor: pointer;
    transition: background-color 0.2s;
  }
  .launcher a:hover {
    background-color: #a00d24;
  }
</style>
</head>
<body>
<div class="launcher">
  <h2>Register a Lead</h2>
  <p>Opens the lead registration form in a new window.</p>
  <!-- target="_top" breaks out of ALL iframes including HubSpot's sandbox -->
  <a href="https://colin-yeb.github.io/dashboardofrm/form.html" target="_top">Open Lead Form</a>
</div>
</body>
</html>
